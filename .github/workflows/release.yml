name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # npm チャネル単独の再実行口（P6）。既存 GitHub Release の正本 ZIP から再取得して publish し直す。
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)publish to npm (e.g. v0.1.2). Runs the npm channel only."
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-browser:
    name: Build browser package
    runs-on: ubuntu-latest
    # workflow_dispatch（npm-only 再実行）ではビルド系 job を走らせない
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package single HTML
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          ./scripts/release/build-browser-single-html.ps1 -Clean -Verify -Package -Version "$tag"

      - name: Upload browser ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-package
          path: dist/offline-md-editor-viewer-browser-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload browser single HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-single-html
          path: dist/browser/offline-md-editor-viewer.html
          if-no-files-found: error

  build-desktop-windows:
    name: Build Windows desktop portable exe
    runs-on: windows-latest
    # workflow_dispatch（npm-only 再実行）ではビルド系 job を走らせない
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Build single HTML for desktop frontend
        shell: pwsh
        run: |
          ./scripts/release/build-browser-single-html.ps1 -Clean -Verify

      - name: Stage desktop frontend (single HTML)
        shell: pwsh
        run: |
          ./scripts/release/stage-desktop-frontend.ps1

      - name: Build desktop portable exe (release single HTML frontend)
        run: npx tauri build --config src-tauri/tauri.release.conf.json
        working-directory: apps/desktop

      - name: Package portable exe as ZIP
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          $packageName = "offline-md-editor-viewer-desktop-$tag-win-x64-portable"
          $stage = "dist/$packageName"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path "apps/desktop/src-tauri/target/release/offline-md-editor-viewer.exe" -Destination $stage
          Copy-Item -Path "README.md","README.ja.md","CHANGELOG.md","CHANGELOG.ja.md","LICENSE","THIRD_PARTY_NOTICES.md" -Destination $stage
          Copy-Item -Path "LICENSES" -Destination $stage -Recurse
          Compress-Archive -Path $stage -DestinationPath "dist/$packageName.zip" -Force

      - name: Upload desktop ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-portable
          path: dist/offline-md-editor-viewer-desktop-${{ github.ref_name }}-win-x64-portable.zip
          if-no-files-found: error

      - name: Upload desktop single exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-exe
          path: apps/desktop/src-tauri/target/release/offline-md-editor-viewer.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-browser
      - build-desktop-windows

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Verify ZIP-internal artifacts match standalone assets
        shell: bash
        run: |
          set -euo pipefail
          cd dist/release-assets
          tag="${GITHUB_REF_NAME}"

          browser_zip="offline-md-editor-viewer-browser-${tag}.zip"
          desktop_zip="offline-md-editor-viewer-desktop-${tag}-win-x64-portable.zip"
          single_html="offline-md-editor-viewer.html"
          single_exe="offline-md-editor-viewer.exe"

          for f in "$browser_zip" "$desktop_zip" "$single_html" "$single_exe"; do
            if [ ! -f "$f" ]; then
              echo "Missing release asset: $f" >&2
              exit 1
            fi
          done

          unzip -p "$browser_zip" "offline-md-editor-viewer-browser-${tag}/offline-md-editor-viewer.html" > .zip-html.bin
          zip_html_hash=$(sha256sum .zip-html.bin | cut -d' ' -f1)
          single_html_hash=$(sha256sum "$single_html" | cut -d' ' -f1)
          if [ "$zip_html_hash" != "$single_html_hash" ]; then
            echo "MISMATCH: browser ZIP HTML ($zip_html_hash) differs from standalone HTML ($single_html_hash)" >&2
            exit 1
          fi
          echo "OK: browser ZIP HTML matches standalone HTML ($single_html_hash)"

          unzip -p "$desktop_zip" "offline-md-editor-viewer-desktop-${tag}-win-x64-portable/offline-md-editor-viewer.exe" > .zip-exe.bin
          zip_exe_hash=$(sha256sum .zip-exe.bin | cut -d' ' -f1)
          single_exe_hash=$(sha256sum "$single_exe" | cut -d' ' -f1)
          if [ "$zip_exe_hash" != "$single_exe_hash" ]; then
            echo "MISMATCH: desktop ZIP exe ($zip_exe_hash) differs from standalone exe ($single_exe_hash)" >&2
            exit 1
          fi
          echo "OK: desktop ZIP exe matches standalone exe ($single_exe_hash)"

          rm -f .zip-html.bin .zip-exe.bin

      - name: Compute SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/release-assets
          tag="${GITHUB_REF_NAME}"
          sha256sum \
            "offline-md-editor-viewer.html" \
            "offline-md-editor-viewer.exe" \
            "offline-md-editor-viewer-browser-${tag}.zip" \
            "offline-md-editor-viewer-desktop-${tag}-win-x64-portable.zip" \
            > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -d "" assets < <(find dist/release-assets -type f -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi
          checksum_section=$'---\n\n## SHA-256 Checksums\n\n```\n'"$(cat dist/release-assets/SHA256SUMS.txt)"$'\n```'

          update_release_notes() {
            existing_notes="$(gh release view "${tag}" --json body --jq '.body')"
            notes_file="$(mktemp)"
            TAG="${tag}" EXISTING_NOTES="${existing_notes}" CHECKSUM_SECTION="${checksum_section}" python3 - <<'PY' > "${notes_file}"
          import os

          tag = os.environ["TAG"]
          body = os.environ["EXISTING_NOTES"].rstrip()
          checksum = os.environ["CHECKSUM_SECTION"].rstrip()
          intro_lines = [
              f"## Offline Markdown Editor Viewer {tag}",
              "",
              "A local-first Markdown editor/viewer that runs in your browser or as a Windows desktop app.",
              "",
              "- Browser edition: single HTML file, no install required",
              "- Windows edition: portable `.exe`",
              "- No CDN or external network calls",
              "- Edit local `.md` files and preview side-by-side",
              "- Folder tree, synced scrolling, encoding support",
              "- UI in 13 languages",
              "",
              "Start with the browser edition unless you need desktop-only features.",
              "",
              "## Downloads",
              "",
              "- `offline-md-editor-viewer.html` - browser edition, single HTML",
              f"- `offline-md-editor-viewer-browser-{tag}.zip` - browser edition package with docs/licenses",
              "- `offline-md-editor-viewer.exe` - Windows portable app",
              f"- `offline-md-editor-viewer-desktop-{tag}-win-x64-portable.zip` - Windows portable package",
          ]
          intro = "\n".join(intro_lines)
          intro_marker = "## Offline Markdown Editor Viewer "
          marker = "## SHA-256 Checksums"

          idx = body.find(marker)
          if idx != -1:
              sep_idx = body.rfind("\n---", 0, idx)
              if sep_idx == -1:
                  sep_idx = idx
              body = body[:sep_idx].rstrip()

          if body:
              if not body.startswith(intro_marker):
                  body = intro + "\n\n" + body
              print(body)
              print()
              print(checksum)
          else:
              print(intro)
              print()
              print(checksum)
          PY
            gh release edit "${tag}" --notes-file "${notes_file}"
            rm -f "${notes_file}"
          }

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
            update_release_notes
          else
            # Create with auto-generated notes first, then append checksum section
            gh release create "${tag}" "${assets[@]}" --title "${tag}" --generate-notes
            update_release_notes
          fi

  publish-npm:
    name: Publish npm launcher package
    runs-on: ubuntu-latest
    needs:
      - publish-release
    # 正本先行（P3）: タグ push 時は GitHub Release 完了後にのみ実行。
    # workflow_dispatch 時は needs が skip されても単独で実行する（npm-only 再実行・P6）。
    if: >-
      always() &&
      (
        (github.event_name == 'push' && needs.publish-release.result == 'success') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: read
      # npm trusted publishing（OIDC）用。認証の正本はこれ 1 本（P8・長寿命トークン排除）。
      # OIDC が使えない場合の代替は NPM_TOKEN（Granular・Bypass 2FA）を GitHub Secrets に置き
      # setup-node の registry-url + NODE_AUTH_TOKEN で渡す方式だが、ドリフト排除のため本 workflow には組み込まない。
      id-token: write

    env:
      # バージョンはタグのみを単一ソースとする（P8）
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # trusted publishing には npm >= 11.5.1 が必要
      - name: Update npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Download release assets (single source of truth)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist/npm-stage
          gh release download "${RELEASE_TAG}" \
            --pattern "offline-md-editor-viewer-browser-${RELEASE_TAG}.zip" \
            --pattern "SHA256SUMS.txt" \
            --dir dist/npm-stage

      - name: Verify checksum and extract HTML from release ZIP
        run: |
          set -euo pipefail
          cd dist/npm-stage
          zip_name="offline-md-editor-viewer-browser-${RELEASE_TAG}.zip"
          # 正本 ZIP を SHA256SUMS.txt と照合（P9）
          grep "  ${zip_name}\$" SHA256SUMS.txt | sha256sum -c -
          # ZIP から単一 HTML を抽出して npm パッケージへ同梱（repackager: 別ビルドはしない。P1/P2）
          unzip -p "${zip_name}" \
            "offline-md-editor-viewer-browser-${RELEASE_TAG}/offline-md-editor-viewer.html" \
            > "${GITHUB_WORKSPACE}/apps/npm/offline-md-editor-viewer.html"
          test -s "${GITHUB_WORKSPACE}/apps/npm/offline-md-editor-viewer.html"

      - name: Sync package version to tag
        working-directory: apps/npm
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          npm version "${version}" --no-git-tag-version

      - name: Publish to npm (idempotent, OIDC trusted publishing)
        working-directory: apps/npm
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          pkg="offline-md-editor-viewer"

          # idempotent: 既に同版が存在すれば成功扱いでスキップ（P5）
          if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
            echo "${pkg}@${version} is already published. Skipping (idempotent)."
            exit 0
          fi

          # E429（rate limit）等の一時失敗は指数バックオフで最大 3 回（P5）
          max_attempts=3
          for attempt in $(seq 1 "${max_attempts}"); do
            if output=$(npm publish --access public --provenance 2>&1); then
              echo "${output}"
              echo "Published ${pkg}@${version}."
              exit 0
            fi
            echo "${output}"
            # レース（並行 publish 済み）も成功扱い
            if npm view "${pkg}@${version}" version >/dev/null 2>&1; then
              echo "${pkg}@${version} appeared on the registry. Treating as success."
              exit 0
            fi
            if [ "${attempt}" -lt "${max_attempts}" ] && echo "${output}" | grep -qiE "E429|429 Too Many Requests|ETIMEDOUT|ECONNRESET|EAI_AGAIN"; then
              delay=$((30 * attempt * attempt))
              echo "Transient failure (attempt ${attempt}/${max_attempts}). Retrying in ${delay}s..."
              sleep "${delay}"
              continue
            fi
            echo "npm publish failed (attempt ${attempt}/${max_attempts})." >&2
            exit 1
          done
